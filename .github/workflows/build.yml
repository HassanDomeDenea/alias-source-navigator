name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Test and build
        run: ./gradlew test buildPlugin verifyPluginProjectConfiguration
      - uses: actions/upload-artifact@v6
        with:
          name: alias-source-navigator
          path: build/distributions/*.zip
