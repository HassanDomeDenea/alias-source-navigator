name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Test and build
        run: ./gradlew test buildPlugin verifyPluginProjectConfiguration
      - uses: actions/upload-artifact@v4
        with:
          name: alias-source-navigator
          path: build/distributions/*.zip
